apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      nodeSelector:
        role: backend

      containers:
      - name: backend
        image: harishkorapati/ecommerce-backend:v2
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DATABASE_HOST

        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DATABASE_PORT

        - name: DATABASE_DB
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DATABASE_DB

        - name: DATABASE_USER
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DATABASE_USER

        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: DATABASE_PASSWORD

        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: PORT
